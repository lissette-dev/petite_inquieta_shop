{% extends "base.html" %}

{% block title %}Eliminar Producto | Petite Inquieta{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-danger shadow">
                <div class="card-body text-center">
                    <h2 class="text-danger mb-4">¿Estás seguro?</h2>
                    <p class="lead">Vas a eliminar el producto: <br><strong>"{{ producto.nombre }}"</strong></p>
                    <p class="text-muted small">Esta acción no se puede deshacer.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">Sí, eliminar definitivamente</button>
                            <a href="{% url 'productos' %}" class="btn btn-light border">No, volver al catálogo</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
