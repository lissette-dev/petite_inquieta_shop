{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Petite Inquieta{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <!-- Carrito flotante fijo (fuera de todo contenedor) -->

        {% if user.is_authenticated %}
        <a href="{% url 'ver_carrito' %}" style="position:fixed;top:20px;right:24px;font-size:1.6rem;z-index:9999;text-decoration:none;">
            🛒{% if carrito_count > 0 %}<span style="position:absolute;top:-8px;right:-10px;background:#e8603c;color:white;font-size:11px;font-weight:700;border-radius:50%;padding:2px 6px;">{{ carrito_count }}</span>{% endif %}
        </a>
        {% endif %}

    <header class="bg-light py-3 shadow-sm">
        <div class="container text-center">
            <h1 class="display-3 fw-bold" style="color:#5d4037;">Petite Inquieta</h1>
            {% include "partials/navbar.html" %}
        </div>
    </header>

    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
